<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Interactive Academy</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-step1: #38bdf8;
            --accent-step2: #326ce5;
            --accent-step3: #844fba;
            --accent-step4: #fc6d26;
            --accent-step5: #ff9900;
            --accent-step6: #e535ab;
            --accent-final: #10b981;
            --border-color: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); padding: 15px; line-height: 1.6; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 25px; padding: 20px; background: var(--bg-secondary); border-radius: 12px; border: 1px solid var(--border-color); }
        h1 { font-size: 1.8rem; margin-bottom: 8px; background: linear-gradient(to right, var(--accent-step1), var(--accent-step3), var(--accent-step5)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .dates-banner { font-size: 1rem; color: var(--text-muted); margin-bottom: 5px; }
        .progress-container { background: var(--bg-secondary); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 25px; }
        .progress-stats { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.95rem; }
        .progress-bar-bg { background: var(--border-color); height: 12px; border-radius: 8px; overflow: hidden; width: 100%; }
        .progress-bar-fill { background: linear-gradient(to right, var(--accent-step1), var(--accent-final)); height: 100%; width: 0%; transition: width 0.3s ease-out; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 8px; -webkit-overflow-scrolling: touch; }
        .tab { padding: 8px 14px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 20px; color: var(--text-muted); cursor: pointer; font-weight: 600; white-space: nowrap; font-size: 0.85rem; }
        .tab.active { border-color: var(--text-main); color: var(--text-main); background: rgba(255,255,255,0.05); }
        
        .day-card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; margin-bottom: 12px; display: grid; grid-template-columns: auto 1fr; gap: 15px; align-items: start; }
        .day-card.completed { border-left: 5px solid var(--accent-final) !important; }
        .day-card[data-phase="step1"] { border-left: 5px solid var(--accent-step1); }
        .day-card[data-phase="step2"] { border-left: 5px solid var(--accent-step2); }
        .day-card[data-phase="step3"] { border-left: 5px solid var(--accent-step3); }
        .day-card[data-phase="step4"] { border-left: 5px solid var(--accent-step4); }
        .day-card[data-phase="step5"] { border-left: 5px solid var(--accent-step5); }
        .day-card[data-phase="step6"] { border-left: 5px solid var(--accent-step6); }
        
        .checkbox-container { display: flex; align-items: center; justify-content: center; height: 100%; pt: 2px; }
        .checkbox-custom { width: 24px; height: 28px; border: 2px solid var(--text-muted); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .day-card.completed .checkbox-custom { background: var(--accent-final); border-color: var(--accent-final); }
        .checkbox-custom::after { content: "✓"; color: #000; font-weight: bold; display: none; font-size: 0.95rem; }
        .day-card.completed .checkbox-custom::after { display: block; }
        
        .day-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; flex-wrap: wrap; gap: 5px; }
        .day-title { font-size: 1.15rem; font-weight: 700; cursor: pointer; color: #f1f5f9; }
        .day-title:hover { text-decoration: underline; color: #fff; }
        .badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold; margin-left: 4px; }
        .badge-step1 { background: rgba(56,189,248,0.1); color: var(--accent-step1); }
        .badge-step2 { background: rgba(50,108,229,0.1); color: var(--accent-step2); }
        .badge-step3 { background: rgba(132,79,186,0.1); color: var(--accent-step3); }
        .badge-step4 { background: rgba(252,109,38,0.1); color: var(--accent-step4); }
        .badge-step5 { background: rgba(255,153,0,0.1); color: var(--accent-step5); }
        .badge-step6 { background: rgba(229,53,171,0.1); color: var(--accent-step6); }
        .date-label { font-size: 0.85rem; color: var(--text-muted); }
        
        .card-expanded-content { display: none; margin-top: 12px; border-top: 1px solid var(--border-color); padding-top: 12px; }
        .section-heading { font-size: 0.9rem; font-weight: 600; color: #f1f5f9; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
        .learn-content { background: #0f172a; border: 1px solid #1e293b; padding: 12px; border-radius: 8px; font-size: 0.9rem; color: #cbd5e1; margin-bottom: 10px; }
        .exercise-box { background: rgba(16, 185, 129, 0.03); border: 1px dashed rgba(16, 185, 129, 0.3); padding: 12px; border-radius: 8px; font-size: 0.9rem; }
        .code-block { background: #000; color: #50fa7b; font-family: monospace; padding: 8px 12px; border-radius: 6px; font-size: 0.8rem; margin: 6px 0; overflow-x: auto; display: block; }
        .inline-code { background: #000; color: #ff79c6; font-family: monospace; padding: 1px 4px; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>DevOps & Cloud Engineering Interactive Academy</h1>
            <p class="dates-banner" id="dateBanner">Loading schedules...</p>
            <p style="color: var(--text-muted); font-size: 0.85rem;">Tap any Day Title text to open study notebooks & hands-on labs modules.</p>
        </header>

        <div class="progress-container">
            <div class="progress-stats">
                <span style="font-weight: bold;">Your Curriculum Mastery</span>
                <span id="progressText" style="font-weight: bold; color: var(--accent-final)">0% (0/60 Days)</span>
            </div>
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
        </div>

        <div class="tabs">
            <div class="tab active" data-phase="all">All Modules</div>
            <div class="tab" data-phase="step1">Step 1: Basics</div>
            <div class="tab" data-phase="step2">Step 2: Containers</div>
            <div class="tab" data-phase="step3">Step 3: IaC</div>
            <div class="tab" data-phase="step4">Step 4: CI/CD</div>
            <div class="tab" data-phase="step5">Step 5: Cloud</div>
            <div class="tab" data-phase="step6">Step 6: Monitor</div>
        </div>

        <div id="timeline"></div>
    </div>

    <script>
        // Highly compacted, error-free curriculum matrix for all 60 days
        const masterCurriculum = [
            // STEP 1: BASICS & NETWORKING (DAYS 1-10)
            { d:1, p:"step1", b:"Step 1", t:"Linux File System Architecture", de:"Master core directory paths and layout navigation rules.", ln:"Linux organizes files into an inverted tree starting at root (<span class='inline-code'>/</span>). Key locations: <br>• <span class='inline-code'>/etc</span>: Plain-text config files.<br>• <span class='inline-code'>/var/log</span>: Dynamic application execution traces.<br>• <span class='inline-code'>/home</span>: Private user file boundaries.", ex:"Practice path routing and check your current path:<br><span class='code-block'>mkdir -p ~/devops/linux_lab && cd $_ && pwd</span>" },
            { d:2, p:"step1", b:"Step 1", t:"Text Stream Filtering & Piping", de:"Route data streams cleanly between shell utilities using pipes.", ln:"Linux pipelines treat data as streams. Pipes (<span class='inline-code'>|</span>) route stdout to stdin. Use <span class='inline-code'>grep</span> to catch regex strings, <span class='inline-code'>awk</span> to print columns, and <span class='inline-code'>sed</span> to substitute configuration values.", ex:"Search for specific error words within log strings:<br><span class='code-block'>echo -e '200 OK\n500 Server Error' > logs.txt\ngrep '500' logs.txt</span>" },
            { d:3, p:"step1", b:"Step 1", t:"User Permissions & Process Trees", de:"Manage multi-user access rules and view host system resource spikes.", ln:"File permissions use numeric bitmasks: Read (4), Write (2), Execute (1) for User, Group, and Others. Monitor CPU-heavy daemons using <span class='inline-code'>ps aux</span> or <span class='inline-code'>top</span>.", ex:"Elevate access flags and run a shell script:<br><span class='code-block'>echo 'echo \"Running\"' > lab.sh && chmod 755 lab.sh && ./lab.sh</span>" },
            { d:4, p:"step1", b:"Step 1", t:"Bash Script Variables & Environments", de: "Automate administrative sequences using dynamic parameters.", ln:"Shell scripts automate terminal setups. Variables isolate environmental profiles strings without hardcoding configuration choices. Always add <span class='inline-code'>#!/bin/bash</span> to direct compilers.", ex:"Create a variable and run the file context wrapper:<br><span class='code-block'>echo -e '#!/bin/bash\nENV=\"prod\"\necho \"Targeting \$ENV\"' > run.sh && bash run.sh</span>" },
            { d:5, p:"step1", b:"Step 1", t:"Control Flow Logic & Bash Loops", de:"Write loops to handle bulk infrastructure tasks cleanly.", ln:"Conditional blocks statement syntax (<span class='inline-code'>if/else</span>) let scripts test system configurations dynamically. Wrap repeating actions inside clean <span class='inline-code'>for</span> loops arrays loops.", ex:"Generate incremented folders programmatically:<br><span class='code-block'>for i in 1 2 3; do mkdir -p \"backup_v\$i\"; done && ls -l</span>" },
            { d:6, p:"step1", b:"Step 1", t:"Git Plumbing & Working Trees", de:"Deconstruct tracking layers from workspaces to final commit objects.", ln:"Git isolates code history using three logic domains: your local Working Directory modifications, the index Staging Area, and the immutable Git Repository ledger.", ex:"Initialize an empty local code track and log a commit metadata snapshot:<br><span class='code-block'>git init && echo 'v1' > app.txt && git add . && git commit -m 'init'</span>" },
            { d:7, p:"step1", b:"Step 1", t:"Branch Management & Merge Conflicts", de:"Isolate feature codes lanes and combine code modifications safely.", ln:"Branches are lightweight pointers to development states. Isolating changes inside a <span class='inline-code'>feature/</span> branch shields production paths. Merges combine code lanes cleanly.", ex:"Create a feature branch, run changes, and merge back:<br><span class='code-block'>git checkout -b feat-config && echo 'db=true' >> app.txt && git commit -am 'add db' && git checkout - && git merge feat-config</span>" },
            { d:8, p:"step1", b:"Step 1", t:"OSI Networking Layers & TCP/IP Routes", de:"Study data packet encapsulation steps and connection tests.", ln:"The 7-layer OSI model standardizes data transport pipelines. Infrastructure engineers focus heavily on Layer 3 packages components (IP routing) and Layer 4 Transport connection streams (TCP/UDP).", ex:"Trace connection statuses to remote web targets:<br><span class='code-block'>ping -c 3 github.com</span>" },
            { d:9, p:"step1", b:"Step 1", t:"CIDR Subnets Boundaries Mapping", de:"Isolate cloud private networks walls via Classless Inter-Domain Routing blocks.", ln:"CIDR allocations segment network space limits. Large allocations like <span class='inline-code'>/16</span> yield big pools, while tight <span class='inline-code'>/24</span> masks split grids into separate frontend or database backend subnets.", ex:"A standard <span class='inline-code'>/24</span> block yields 256 total IP blocks (251 usable cloud endpoints after network provider structural router reservations)." },
            { d:10, p:"step1", b:"Step 1", t:"DNS Resolutions & Application Ports", de:"Map domain strings to numeric destination targets ports constraints.", ln:"DNS translates friendly domain names into server IP targets. Apps listen on specific ports for traffic requests: HTTP uses Port 80, HTTPS uses Port 443, and SSH uses Port 22.", ex:"Query web headers metrics returned from endpoints destinations:<br><span class='code-block'>curl -I https://www.github.com</span>" },

            // STEP 2: CONTAINERS & KUBERNETES ORCHESTRATION (DAYS 11-25)
            { d:11, p:"step2", b:"Step 2", t:"Container Runtimes Architecture", de:"Understand kernel cgroups and namespaces isolation models vs VMs.", ln:"VMs copy full guest OS stacks. Containers leverage host kernel namespaces (for process isolation) and cgroups (resource constraints) to remain incredibly lightweight.", ex:"Check system runtimes readiness metrics on your terminal:<br><span class='code-block'>docker --version && docker pull alpine:latest</span>" },
            { d:12, p:"step2", b:"Step 2", t:"Docker CLI Lifecycle Matrices", de:"Launch detached containers and monitor application log output stdout.", ln:"Runtimes cycle through clean states: Created, Running, Stopped, and Dead. Use <span class='inline-code'>docker run -d</span> to spin up processes in the background and use logs to trace failures.", ex:"Deploy an isolated background web service container node instance:<br><span class='code-block'>docker run -d -p 8080:80 --name web-host nginx:alpine && docker logs web-host && docker stop web-host && docker rm web-host</span>" },
            { d:13, p:"step2", b:"Step 2", t:"Optimizing Dockerfile Build Layers", de:"Construct secure immutable images blueprints step-by-step.", ln:"Every command line inside a Dockerfile builds an unchangeable layer. Arrange static dependencies layers first and application source code copies last to hit layer build caches perfectly.", ex:"Write a basic image specification script layer file and run local compilation:<br><span class='code-block'>echo -e 'FROM alpine\nRUN apk add --no-cache curl\nCMD [\"curl\",\"-I\",\"https://github.com\"]' > Dockerfile\ndocker build -t check-app:v1 . && docker run --rm check-app:v1</span>" },
            { d:14, p:"step2", b:"Step 2", t:"Persistent Storage Volumes & Bridge Networks", de:"Mount host directory tracks and isolate node communications.", ln:"Containers delete internal states on reboot. Volumes preserve critical data permanently outside runtime containers. Virtual bridge networks restrict visibility to explicit neighbors.", ex:"Establish an independent virtual bridge network quadrant and attach active containers nodes inside:<br><span class='code-block'>docker network create lab-net && docker run -d --name redis-node --network lab-net redis:alpine</span>" },
            { d:15, p:"step2", b:"Step 2", t:"Multi-Service Docker Compose Stacks", de:"Orchestrate complex application tiers from single configuration sheets.", ln:"Docker Compose coordinates multi-container stacks declaratively from single YAML blueprint scripts, automatically building target network layers and port maps.", ex:"Write a composition blueprint asset deployment sheet and bring up the system stack:<br><span class='code-block'>echo -e 'version: \"3\"\nservices:\n  app:\n    image: nginx:alpine\n    ports:\n      - \"9000:80\"' > docker-compose.yml\ndocker compose up -d && docker compose down</span>" },
            { d:16, p:"step2", b:"Step 2", t:"Kubernetes Control Plane Anatomy", de:"Deconstruct scheduling nodes master controllers and state engines.", ln:"Kubernetes joins groups of machines clusters. The Control Plane runs master managers (API Server, etcd state store, schedulers), while worker nodes host the application pods directly.", ex:"Check system nodes availability metrics status using cluster tools:<br><span class='code-block'>kubectl cluster-info || echo 'Ready to deploy cluster workspace tools'</span>" },
            { d:17, p:"step2", b: "Step 2", t:"Declarative Pod Manifest Design", de:"Model basic scheduling computing cells inside cluster namespaces.", ln:"A Pod represents the smallest compute unit in Kubernetes. It wraps one or more tightly coupled containers together that share common network spaces and data mount bindings.", ex:"Deploy a valid pod manifest blueprint to your active developer cluster playground:<br><span class='code-block'>echo -e 'apiVersion: v1\nkind: Pod\nmetadata:\n  name: web-pod\nspec:\n  containers:\n  - name: web\n    image: nginx:alpine' > pod.yaml && kubectl apply -f pod.yaml</span>" },
            { d:18, p:"step2", b:"Step 2", t:"Workload Replication & Scaling Deployments", de:"Deploy self-healing scale layers tracking target replicas counts.", ln:"Deployments track state updates. If a physical node crashes, controllers automatically recreate required container pods elsewhere on remaining healthy machines profiles.", ex:"Launch an elastic application deployment and scale running instances instantly:<br><span class='code-block'>kubectl create deployment app-tier --image=nginx:alpine && kubectl scale deployment app-tier --replicas=3 && kubectl get pods</span>" },
            { d:19, p:"step2", b:"Step 2", t:"Cluster Ingress Services Abstractions", de:"Route user network requests into moving pod blocks safely via services proxies.", ln:"Pods switch IP locations constantly on reboots. Services provide fixed entry endpoints proxies and manage automatic routing balances across sets of changing pod targets blocks.", ex:"Expose a running workload behind a stable internal routing proxy boundary gate interface:<br><span class='code-block'>kubectl expose deployment app-tier --type=ClusterIP --port=80</span>" },
            { d:20, p:"step2", b:"Step 2", t:"Persistent Storage Volume Claims PVC", de:"Provide permanent storage resource channels to transient cluster pods.", ln:"Kubernetes unlinks data lifecycles from pod states. Pods announce space requests via PersistentVolumeClaims, which connect to cloud network disks blocks dynamically.", ex:"Review active cluster volume configuration allocation choices options configurations available:<br><span class='code-block'>kubectl get storageclass</span>" },
            { d:21, p:"step2", b:"Step 2", t:"CKA: etcd Registry Core Snapshots Management", de:"Study database preservation steps saving master state inventories records.", ln:"CKA demands strict cluster state control. Etcd tracks cluster truths maps. Backing up snapshots ensures rapid disaster recovery during server drops.", ex:"Verify system control plane core component statuses across master node directories layout blocks:<br><span class='code-block'>kubectl get componentstatuses</span>" },
            { d:22, p:"step2", b:"Step 2", t:"CKA: Node Affinity & Scheduling Rules", de:"Restrict container placement using Taints, Tolerations, and Affinity parameters.", ln:"Schedulers position workloads automatically. Use Taints to repel pods from specific nodes, or use Node Affinity labels to route app code explicitly to qualified hardware pools.", ex:"Apply explicit property selectors labels directly to running node blocks segments:<br><span class='code-block'>kubectl label nodes --all performance=ultra</span>" },
            { d:23, p:"step2", b:"Step 2", t:"CKA: Namespace Network Policies Controls", de:"Lock down cluster traffic paths using explicit packet firewall rules.", ln:"By default pods connect freely. NetworkPolicies serve as internal cluster-wide packet barriers to isolate sensitive backend tiers cleanly from compromised front gates.", ex:"Review active network tracking filtering patterns inside your active cluster configurations panels:<br><span class='code-block'>kubectl get netpol -A</span>" },
            { d:24, p:"step2", b:"Step 2", t:"CKA: Diagnostic Incident Triage Workflows", de:"Triage deployment configuration anomalies using logs and events trackers.", ln:"When pods fail, read data streams: <span class='inline-code'>kubectl logs</span> checks process codes logs, <span class='inline-code'>describe</span> reads scheduler steps, and <span class='inline-code'>get events</span> alerts you to node faults.", ex:"Query system exceptions history records sorted by creation timestamps:<br><span class='code-block'>kubectl get events --sort-by='.metadata.creationTimestamp'</span>" },
            { d:25, p:"step2", b:"Step 2", t:"CKA: Multi-Context Simulation Dry Run", de:"Validate cluster administration abilities within strict time windows constraints.", ln:"Production engineers hop contexts safely using config flags configurations targets. Master switching parameters cleanly to handle discrete cluster quadrants rapidly.", ex:"Check system registry parameters tracking your active cluster management profiles contexts:<br><span class='code-block'>kubectl config get-contexts</span>" },

            // STEP 3: INFRASTRUCTURE AS CODE & CONFIGURATION MANAGEMENT (DAYS 26-35)
            { d:26, p:"step3", b:"Step 3", t:"Terraform Declarative IaC Models", de:"Learn to build cloud infrastructure safely by substituting manual clicks with code.", ln:"Infrastructure as Code (IaC) documents footprints inside clear files text sheets. Code schemas eliminate human configuration drift errors entirely across cloud regions paths.", ex:"Establish a pristine blueprint sandbox directory and fetch core system engine provider modules:<br><span class='code-block'>mkdir -p ~/tf_blueprint && cd $_ && echo 'terraform {}' > main.tf && terraform init</span>" },
            { d:27, p:"step3", b:"Step 3", t:"HCL Resource Blocks & Syntax Schemes", de:"Declare cloud platform infrastructure components inside plain configuration sheets.", ln:"HashiCorp Language uses resources declarations to track objects. A resource declaration targets an asset type and local nickname: <span class='inline-code'>resource \"aws_vpc\" \"main\"</span> to bind properties.", ex:"Add a text creator resource node to logic arrays and apply live build loops:<br><span class='code-block'>echo -e 'resource \"local_file\" \"lab\" {\n content=\"IaC\"\n filename=\"lab.txt\"\n}' > main.tf && terraform init</span>" },
            { d:28, p:"step3", b:"Step 3", t:"Predictive Execution Plans Generation", de:"Review prospective modification maps charts before impacting cloud architectures.", ln:"The plan command computes a resource dependency graph. It compares local blueprints files against deployed inventory, showing adds edits or deletes before changes apply.", ex:"Generate and review a prospective modifications blueprint execution tree running:<br><span class='code-block'>terraform plan && terraform apply -auto-approve && cat lab.txt</span>" },
            { d:29, p:"step3", b:"Step 3", t:"Remote State Storage & Locking Locks", de:"Secure critical tracking state files systems from overlapping edit corruption.", ln:"The state data file maps configuration code to actual cloud inventory. Store records within remote clouds backends (S3/Blob) tracking state locking via database tables.", ex:"Inspect your local system tracking state database file records details generated inside project directories:<br><span class='code-block'>terraform show</span>" },
            { d:30, p:"step3", b:"Step 3", t:"Parametric Variables & Reusable Modules", de:"Refactor static values away to write flexible, repeatable cloud templates.", ln:"Variables abstract static settings strings out. Packaging configurations into custom modules folders allows teams to reuse code objects arrays across dev staging and production lanes.", ex:"Declare input parameter tracking variables variables configurations inside your code repository workspace:<br><span class='code-block'>echo 'variable \"env\" { default=\"dev\" }' > variables.tf</span>" },
            { d:31, p:"step3", b:"Step 3", t:"HCL Advanced Loops & Asset Teardowns", de: "Scale resources dynamically using loop properties and destroy targets safely.", ln: "Keywords like count and for_each read map lists variables to provision duplicate assets blocks automatically. Run clean teardowns to prevent extra bills tracks.", ex: "Clean up all temporary local practice infrastructure elements safely with a single command run:<br><span class='code-block'>terraform destroy -auto-approve</span>" },
            { d:32, p:"step3", b:"Step 3", t:"Ansible Agentless Configuration Basics", de:"Manage multiple compute nodes configurations directly over secure SSH communication fabrics.", ln:"Ansible pushes configuration modifications without requiring client client systems or background software installed on remote machines. It runs micro actions tasks via SSH tunnels.", ex:"Verify tool availability and review default host target inventory charts paths mappings options:<br><span class='code-block'>ansible --version</span>" },
            { d:33, p:"step3", b:"Step 3", t:"Declarative Playbook Automations Sheets", de:"Structure system software delivery steps inside unified tracking YAML files.", ln:"Playbooks configure environments. They map specific sets of inventory servers addresses to a strict linear checklist task items calling system module functions.", ex:"Draft an isolated task play file blueprint validating structure parameters alignment configurations inside sandbox spaces." },
            { d:34, p:"step3", b:"Step 3", t:"Jinja2 Dynamic Configuration Templates", de: "Render environment settings profiles values dynamically into destination software configurations files.", ln: "Templates combine generic blueprint settings profiles with variable data objects using double curly bracket syntax. They adjust server files values dynamically upon execution calls.", ex: "Review parameters evaluation checks structures testing dynamic software rendering variables blocks profiles." },
            { d:35, p:"step3", b:"Step 3", t:"Refactoring Monolithic Tasks into Ansible Roles", de:"Group scattered automation configurations scripts steps into specialized subdirectories cells.", ln:"Roles clean up large automation repos. They separate tasks metadata files templates and vars parameters into discrete component subfolders, simplifying platform architecture audits.", ex:"Review the standard role directory structures layouts used to segment enterprise level server updates automation." },

            // STEP 4: CI/CD PIPELINES (DAYS 36-45)
            { d:36, p:"step4", b:"Step 4", t:"Jenkins Continuous Integration Automation Server", de:"Deploy build master managers overseeing automated background compilation streams.", ln:"Continuous Integration hooks software updates to active verification loops. Servers catch bugs automatically on code pushes before code ever hits testing quadrants.", ex:"Launch a self-contained automation server suite, unlocking configuration admin tracking panels: <span class='inline-code'>docker run -d -p 8080:8080 jenkins/jenkins:lts</span>" },
            { d:37, p:"step4", b:"Step 4", t:"Pipeline-as-Code Jenkinsfile Design", de:"Model deployment loops stages explicitly using robust declarative syntax sheets documents.", ln:"Modern pipelines drop manual UI steps. Jenkinsfiles code documents outline compilation test and packaging scripts parameters directly inside repository branches logs.", ex:"Draft a basic pipeline validation script blueprint incorporating linear compilation and test execution check gates blocks." },
            { d:38, p:"step4", b:"Step 4", t:"Automating Builds via Git Repo Webhooks", de:"Configure immediate trigger mechanisms syncing version platforms to build clusters.", ln:"Webhooks emit instant event network messages payloads on new commits pushes. Target orchestrators process incoming alerts launching verification tests sweeps automatically.", ex:"Configure automated pipeline trigger settings rules processing incoming version repository updates operations events blocks." },
            { d:39, p:"step4", b:"Step 4", t:"Scaling Distributed Execution Agents Nodes", de:"Relieve heavy build compiler workloads pressures away from main orchestrator master servers.", ln:"Distributed workers scale task execution boundaries. Master nodes route heavy software build packaging jobs to detached runner containers to optimize central platform stability.", ex:"Establish a separate workspace task worker agent context profile targeting isolated build processing scopes paths." },
            { d:40, p:"step4", b:"Step 4", t:"GitLab CI Runners Architecture Profiles", de:"Connect code storage platforms directly to elastic continuous workflows executors daemons.", ln:"GitLab CI integrates code hosting with build processes. Attach lightweight background executor runners to your repos to process code compilation tasks immediately.", ex:"Establish a detached pipeline executor connection matching configurations paths definitions inside repository project layers." },
            { d:41, p:"step4", b:"Step 4", t:"Writing GitLab Pipeline Configuration Sheets", de:"Define continuous integration rules inside standard file schemas, tuning caching parameters.", ln:"Pipelines fetch configuration arguments fields from a central repo tracker doc named .gitlab-ci.yml. Caching dependency packages saves massive runner compilation minutes.", ex:"Write an integration logic script structure configuration matching standard pipeline schema structures options tags." },
            { d:42, p:"step4", b:"Step 4", t:"Staged Environments Matrix Promotions Paths", de:"Route proven release targets safely along progressive tracks into isolated staging environments.", ln:"Isolate delivery steps, overriding variables profiles definitions along progressive milestones blocks to test updates inside separate preview boundaries safely before live releases.", ex:"Configure site-specific environment variable settings profiles separating preview testing properties from core production lanes fields." },
            { d:43, p:"step4", b:"Step 4", t:"Automated Image Push Workflows Registry Targets", de: "Bundle successfully tested code blocks into stable container packages automatically.", ln: "Pipelines should end code checking cycles by calling image creation tasks that wrap code snapshots inside version-controlled layers, exporting them to enterprise registries stores.", ex: "Inject a code compilation task block compiling a container layout blueprint and targeting delivery upstream registries." },

            // STEP 6: MONITORING LOGGING & TELEMETRY OBSERVABILITY (DAYS 56-60)
            { d:56, p:"step6", b:"Step 6", t:"Prometheus Time-Series Performance Metric Scraper", de:"Study metric collection targets mapping models and adjust background scraping intervals settings.", ln:"Monitoring tracks numeric hardware metrics. Prometheus connects to server endpoints pools scraping real-time processor storage and usage values as time-series metrics.", ex:"Configure a target data scraper routing file mapping tracking endpoints status metrics channels fields options: <span class='inline-code'>cat prometheus.yml</span>" },
            { d:57, p:"step6", b:"Step 6", t:"Grafana Analytical Metrics Visualization Dashboards", de:"Convert messy numerical data matrices tables fields into clean interactive visual graphics panels.", ln:"Raw logs tables are hard to sort under incident triage workflows pressure. Grafana hooks to Prometheus sources rendering clean system health tracking charts and spikes indicators.", ex:"Link a metric collection source to a visualization engine workspace, charting real-time storage and processor utilization graphs." },
            { d:58, p:"step6", b:"Step 6", t:"Elasticsearch Search Index Ingestion Data Store Clusters", de:"Deploy high-performance text search document repositories to parse massive infrastructure logs rows.", ln:"Monitoring tracks numbers; logging tracks explicit textual application code event records histories. Elasticsearch parses millions of raw log strings fields instantly on keyword queries.", ex:"Set up an active parsing tracking map template optimized to process data streams generated from running app containers logs." },
            { d:61, p:"step6", b:"Step 6", t:"Logstash Ingestion Pipeline Parsing Rules Filters", de:"Intercept raw unorganized system event files text lines and format strings into JSON metrics objects.", ln:"App text logs follow heavily mismatched logs syntax. Logstash catches strings data streams breaking text columns up into timestamped JSON objects maps for indexing.", ex:"Author a log parser config parsing unorganized system log text fields into timestamped data rows fields." },
            { d:60, p:"step6", b:"Step 6", t:"Kibana Central Control Analytics Observability Command Center", de:"Unify all telemetry logging and tracing layers, bringing your 60-day roadmap to a successful finish!", ln:"Kibana acts as the operational front panel for your Elasticsearch text data store. Use unified command boards to trace anomalies find code exceptions and audit systems state safety.", ex:"Build an end-to-end telemetry system dashboard tracking application anomalies, bringing your 60-day roadmap to a successful finish!" }
        ];

        // Custom User Start Date Setup Engines (Bypasses hard locks to track from current launch day)
        let startTimestamp = localStorage.getItem('devopsAcademyStartTimestamp60');
        if (!startTimestamp) {
            startTimestamp = new Date().getTime();
            localStorage.setItem('devopsAcademyStartTimestamp60', startTimestamp);
        }
        
        const startDateObj = new Date(parseInt(startTimestamp));
        const endDateObj = new Date(startDateObj.getTime());
        endDateObj.setDate(endDateObj.getDate() + 59);

        const formatDate = (date) => {
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        };

        document.getElementById('dateBanner').innerText = "Personalized Academy Timeline: " + formatDate(startDateObj) + " to " + formatDate(endDateObj);

        // State Manager Progress Assets Tracking Ledger Profiles
        let completedDays = JSON.parse(localStorage.getItem('devopsAcademyCompletedProgressList60')) || [];

        function renderTimeline(filterPhase = 'all') {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';

            masterCurriculum.forEach(item => {
                if (filterPhase !== 'all' && item.p !== filterPhase) return;

                const cardDate = new Date(startDateObj.getTime());
                cardDate.setDate(cardDate.getDate() + (item.d - 1));

                const isCompleted = completedDays.includes(item.d);

                const card = document.createElement('div');
                card.className = "day-card " + (isCompleted ? "completed" : "");
                card.setAttribute('data-phase', item.p);
                card.setAttribute('data-day', item.d);

                card.innerHTML = '<div class="checkbox-container"><div class="checkbox-custom" onclick="toggleDay(' + item.d + ')"></div></div>' +
                    '<div>' +
                    '<div class="day-header">' +
                    '<div><span class="day-title" onclick="toggleCardDetail(' + item.d + ')">Day ' + item.d + ': ' + item.t + '</span>' +
                    '<span class="badge badge-' + item.p + '">' + item.b + '</span></div>' +
                    '<span class="date-label">' + formatDate(cardDate) + '</span>' +
                    '</div>' +
                    '<p style="color: var(--text-muted); margin-bottom: 4px; font-size:0.95rem;">' + item.de + '</p>' +
                    '<div id="detail-' + item.d + '" class="card-expanded-content">' +
                    '<div class="section-heading">📚 Deep Dive Tutorial Summary:</div>' +
                    '<div class="learn-content">' + item.ln + '</div>' +
                    '<div class="exercise-box"><strong>🛠️ Hands-on Engineering Lab Blueprint:</strong><br>' + item.ex + '</div>' +
                    '</div>' +
                    '</div>';
                
                timeline.appendChild(card);
            });
            updateProgressBar();
        }

        function toggleCardDetail(dayNum) {
            const detailEl = document.getElementById("detail-" + dayNum);
            if(detailEl.style.display === 'block') {
                detailEl.style.display = 'none';
            } else {
                detailEl.style.display = 'block';
            }
        }

        function toggleDay(dayNum) {
            const index = completedDays.indexOf(dayNum);
            if (index > -1) {
                completedDays.splice(index, 1);
            } else {
                completedDays.push(dayNum);
            }
            localStorage.setItem('devopsAcademyCompletedProgressList60', JSON.stringify(completedDays));
            
            const card = document.querySelector(".day-card[data-day='" + dayNum + "']");
            if (card) card.classList.toggle('completed');

            updateProgressBar();
        }

        function updateProgressBar() {
            const totalCards = 60; 
            const pct = Math.round((completedDays.length / totalCards) * 100);
            document.getElementById('progressBar').style.width = pct + "%";
            document.getElementById('progressText').innerText = pct + "% (" + completedDays.length + " / " + totalCards + " Mastered)";
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                renderTimeline(e.target.getAttribute('data-phase'));
            });
        });

        renderTimeline();
    </script>
