<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>60-Day DevOps Academy Hub</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-step1: #38bdf8;
            --accent-step2: #326ce5;
            --accent-step3: #844fba;
            --accent-step4: #fc6d26;
            --accent-step5: #ff9900;
            --accent-step6: #e535ab;
            --accent-final: #10b981;
            --border-color: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); padding: 15px; line-height: 1.6; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 25px; padding: 20px; background: var(--bg-secondary); border-radius: 12px; border: 1px solid var(--border-color); }
        h1 { font-size: 1.8rem; margin-bottom: 8px; background: linear-gradient(to right, var(--accent-step1), var(--accent-step3), var(--accent-step5)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .dates-banner { font-size: 1rem; color: var(--text-muted); margin-bottom: 10px; }
        .progress-container { background: var(--bg-secondary); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 25px; }
        .progress-stats { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.95rem; }
        .progress-bar-bg { background: var(--border-color); height: 12px; border-radius: 8px; overflow: hidden; width: 100%; }
        .progress-bar-fill { background: linear-gradient(to right, var(--accent-step1), var(--accent-final)); height: 100%; width: 0%; transition: width 0.3s ease-out; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 8px; }
        .tab { padding: 8px 14px; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 20px; color: var(--text-muted); cursor: pointer; font-weight: 600; white-space: nowrap; font-size: 0.85rem; }
        .tab.active { border-color: var(--text-main); color: var(--text-main); background: rgba(255,255,255,0.05); }
        
        .day-card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; margin-bottom: 12px; display: grid; grid-template-columns: auto 1fr; gap: 15px; align-items: start; }
        .day-card.completed { border-left: 5px solid var(--accent-final) !important; }
        .day-card[data-phase="step1"] { border-left: 5px solid var(--accent-step1); }
        .day-card[data-phase="step2"] { border-left: 5px solid var(--accent-step2); }
        .day-card[data-phase="step3"] { border-left: 5px solid var(--accent-step3); }
        .day-card[data-phase="step4"] { border-left: 5px solid var(--accent-step4); }
        .day-card[data-phase="step5"] { border-left: 5px solid var(--accent-step5); }
        .day-card[data-phase="step6"] { border-left: 5px solid var(--accent-step6); }
        
        .checkbox-custom { width: 24px; height: 24px; border: 2px solid var(--text-muted); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 4px; }
        .day-card.completed .checkbox-custom { background: var(--accent-final); border-color: var(--accent-final); }
        .checkbox-custom::after { content: "✓"; color: #000; font-weight: bold; display: none; font-size: 0.9rem; }
        .day-card.completed .checkbox-custom::after { display: block; }
        
        .day-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; flex-wrap: wrap; gap: 5px; }
        .day-title { font-size: 1.15rem; font-weight: 700; cursor: pointer; color: #f1f5f9; }
        .day-title:hover { text-decoration: underline; }
        .badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold; margin-left: 4px; }
        .badge-step1 { background: rgba(56,189,248,0.1); color: var(--accent-step1); }
        .badge-step2 { background: rgba(50,108,229,0.1); color: var(--accent-step2); }
        .badge-step3 { background: rgba(132,79,186,0.1); color: var(--accent-step3); }
        .badge-step4 { background: rgba(252,109,38,0.1); color: var(--accent-step4); }
        .badge-step5 { background: rgba(255,153,0,0.1); color: var(--accent-step5); }
        .badge-step6 { background: rgba(229,53,171,0.1); color: var(--accent-step6); }
        .date-label { font-size: 0.85rem; color: var(--text-muted); }
        
        .card-expanded-content { display: none; margin-top: 12px; border-top: 1px solid var(--border-color); padding-top: 12px; }
        .link-btn { display: inline-block; padding: 6px 12px; margin: 5px 5px 5px 0; background: #0284c7; color: #fff; text-decoration: none; border-radius: 6px; font-size: 0.85rem; font-weight: 600; }
        .link-btn:hover { background: #0369a1; }
        .link-btn.video { background: #dc2626; }
        .link-btn.video:hover { background: #b91c1c; }
        .link-btn.sandbox { background: #059669; }
        .link-btn.sandbox:hover { background: #047857; }
        .code-block { background: #000; color: #50fa7b; font-family: monospace; padding: 8px 12px; border-radius: 6px; font-size: 0.8rem; margin: 6px 0; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>DevOps Cloud Academy Hub</h1>
            <p class="dates-banner" id="dateBanner">Calculating calendar track...</p>
            <p style="color: var(--text-muted); font-size: 0.85rem;">Tap a Title to expand learning tutorials, official documentation portals, and video labs.</p>
        </header>

        <div class="progress-container">
            <div class="progress-stats">
                <span style="font-weight: bold;">Course Completion Status</span>

            </div>
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
        </div>

        <div class="tabs">

            <div class="tab" data-phase="step5">Step 5: Cloud</div>
            <div class="tab" data-phase="step6">Step 6: Monitor</div>
        </div>

        <div id="timeline"></div>
    </div>

    <script>
        const syllabus = [
            // STEP 1: BASICS & NETWORKING (DAYS 1-10)
            { d: 1, p: "step1", b: "Step 1", t: "Linux File System Architecture", de: "Master navigation hierarchies, root paths, and standard partitions structures.", doc: "https://www.linux.org/", vid: "https://www.youtube.com/watch?v=wBp0Rb-ZJak", sb: "https://bellard.org/jslinux/", cmd: "mkdir -p ~/devops/linux_lab && cd $_ && pwd" },
            { d: 2, p: "step1", b: "Step 1", t: "Text Streams Manipulation & Pipes", de: "Route data streams across command-line filters utilizing standard tools like grep, awk, and sed.", doc: "https://www.gnu.org/software/grep/manual/", vid: "https://www.youtube.com/watch?v=v76Z6Cia1O8", sb: "https://www.katacoda.com/", cmd: "cat /etc/passwd | grep -E 'root|bash'" },
            { d: 3, p: "step1", b: "Step 1", t: "Linux Permissions & Background Processes", de: "Understand user read/write execution access flags and audit resource consumption profiles.", doc: "https://wiki.archlinux.org/title/File_permissions_and_attributes", vid: "https://www.youtube.com/watch?v=H77_Q2fscbU", sb: "https://bellard.org/jslinux/", cmd: "chmod 755 deployment.sh && ps aux --sort=-%cpu" },
            { d: 4, p: "step1", b: "Step 1", t: "Bash Variables & Scripting Workspace", de: "Automate administrative operations scripts loops using localized shell context variables.", doc: "https://www.gnu.org/software/bash/manual/", vid: "https://www.youtube.com/watch?v=e7BufavCP4U", sb: "https://www.shellcheck.net/", cmd: "echo -e '#!/bin/bash\nTARGET=\"dev\"\necho \$TARGET' > init.sh" },
            { d: 5, p: "step1", b: "Step 1", t: "Shell Control Logic and Repeating Loops", de: "Structure logical script pathways with conditional if checking flows and structural loop strings.", doc: "https://bash.cyberciti.biz/guide/Main_Page", vid: "https://www.youtube.com/watch?v=s3F_m-62vK4", sb: "https://bellard.org/jslinux/", cmd: "for i in 1 2 3; do mkdir -p node_$i; done" },
            { d: 6, p: "step1", b: "Step 1", t: "Git Plummer Plumbing & Project Inits", de: "Track configuration changes histories tracking codes trees from working fields up to repository ledgers.", doc: "https://git-scm.com/doc", vid: "https://www.youtube.com/watch?v=hwP7WQkmECE", sb: "https://github.com/", cmd: "git init && git add . && git commit -m 'feat: initial tracking profile'" },
            { d: 7, p: "step1", b: "Step 1", t: "Git Branching Strategy & Merges Conflicts", de: "Isolate feature update lanes cleanly and reconcile conflicting lines adjustments parameters trees.", doc: "https://git-scm.com/book/en/v2/Git-Branching-Basic-Branching-and-Merging", vid: "https://www.youtube.com/watch?v=oPpnCh7InLY", sb: "https://learngitbranching.js.org/", cmd: "git checkout -b feature/configs && git merge master" },
            { d: 8, p: "step1", b: "Step 1", t: "OSI Layer Foundations and Core Protocols", de: "Deconstruct packet communication encapsulation rules focusing heavily on Layer 3 IP routing loops and Layer 4 TCP parameters.", doc: "https://www.cloudflare.com/learning/network-layer/what-is-the-osi-model/", vid: "https://www.youtube.com/watch?v=IPvYjVdBg_Y", sb: "https://www.packettracernetwork.com/", cmd: "ping -c 3 google.com && netstat -tuln" },
            { d: 9, p: "step1", b: "Step 1", t: "CIDR Clouds Networks Addressing Schemes", de: "Calculate network partitioning boundaries lines isolating private subnets from external entry gates networks pools.", doc: "https://www.arin.net/resources/guide/subnets/", vid: "https://www.youtube.com/watch?v=rs39FWDhzDs", sb: "https://www.subnet-calculator.com/", cmd: "echo 'Classless Inter-Domain Routing balances pool spaces calculations formulas.'" },
            { d: 10, p: "step1", b: "Step 1", t: "DNS Pipelines Map Translation Rules", de: "Analyze logical domain mappings translation processes and common application server listening port accessibility flags.", doc: "https://www.dnsmadeeasy.com/", vid: "https://www.youtube.com/watch?v=mpQZVYPuDGU", sb: "https://toolbox.googleapps.com/apps/dig/", cmd: "nslookup github.com && curl -I https://www.github.com" },

            // STEP 2: CONTAINERS & KUBERNETES ORCHESTRATION (DAYS 11-25)
            { d: 11, p: "step2", b: "Step 2", t: "Docker Engines and Virtualization Abstractions", de: "Understand Linux namespace separation rules and process limit boundaries cgroups making containers featherweight.", doc: "https://docs.docker.com/get-started/overview/", vid: "https://www.youtube.com/watch?v=zJ657o5K3Yk", sb: "https://labs.play-with-docker.com/", cmd: "docker system info && docker version" },
            { d: 12, p: "step2", b: "Step 2", t: "Container Lifecycle Management Directives", de: "Master control states, background process tracking commands, and terminal diagnostics logging monitors streams lines.", doc: "https://docs.docker.com/engine/reference/commandline/cli/", vid: "https://www.youtube.com/watch?v=pTFZFxd4hOI", sb: "https://labs.play-with-docker.com/", cmd: "docker run -d -p 80:80 --name host nginx:alpine && docker logs host" },
            { d: 13, p: "step2", b: "Step 2", t: "Dockerfile Construction layers Recipes", de: "Author unchangeable build specifications documents following optimal filesystem instructions arrangements caching paths patterns.", doc: "https://docs.docker.com/engine/reference/builder/", vid: "https://www.youtube.com/watch?v=0B2G3-oW_kY", sb: "https://labs.play-with-docker.com/", cmd: "docker build -t custom-app:v1 . || echo 'Build layer template matching syntax'" },
            { d: 14, p: "step2", b: "Step 2", t: "Volume Mappings & Isolated Bridge Fabrics", de: "Establish persistent storage files paths channels outside temporary containers lifespans and route bridge networks setups.", doc: "https://docs.docker.com/storage/volumes/", vid: "https://www.youtube.com/watch?v=3WkWdf9pXoc", sb: "https://labs.play-with-docker.com/", cmd: "docker volume create store_data && docker network create cluster_lan" },
            { d: 15, p: "step2", b: "Step 2", t: "Orchestrating Environments with Docker Compose", de: "Define complex multi-tier stack configurations programmatically using a single consolidated configuration blueprint yaml document file.", doc: "https://docs.docker.com/compose/", vid: "https://www.youtube.com/watch?v=HG6yIjLaiM4", sb: "https://labs.play-with-docker.com/", cmd: "docker compose up -d && docker compose ps && docker compose down" },
            { d: 16, p: "step2", b: "Step 2", t: "Kubernetes Cluster Node Architecture Topologies", de: "Deconstruct master plane management handlers api engines and worker compute nodes running pod operational daemons loops.", doc: "https://kubernetes.io/docs/concepts/architecture/", vid: "https://www.youtube.com/watch?v=sf3KWe0n76E", sb: "https://labs.play-with-k8s.com/", cmd: "kubectl cluster-info && kubectl get componentstatuses" },
            { d: 17, p: "step2", b: "Step 2", t: "Declarative Pod Manifest Design Schemas", de: "Model the atomic workloads hosting blocks parameters targeting distinct scheduling directories inside node pools networks quadrants.", doc: "https://kubernetes.io/docs/concepts/workloads/pods/", vid: "https://www.youtube.com/watch?v=7X5Xm4feyZc", sb: "https://labs.play-with-k8s.com/", cmd: "kubectl apply -f pod.yaml || echo 'Apply explicit computing pod metadata maps'" },
            { d: 18, p: "step2", b: "Step 2", t: "Deployment Replication Scales Controllers", de: "Maintain constant application availabilities by grouping micro pods blocks behind autonomous self-repairing replication state supervisors.", doc: "https://kubernetes.io/docs/concepts/workloads/controllers/deployment/", vid: "https://www.youtube.com/watch?v=j8S_mO-XGmg", sb: "https://labs.play-with-k8s.com/", cmd: "kubectl create deployment backend-app --image=redis:alpine && kubectl get deployments" },
            { d: 19, p: "step2", b: "Step 2", t: "Cluster Proxy Networks Services Mappings", de: "Provide stable static ingress entry interfaces and load balancing maps over dynamic moving collections pods pools layers.", doc: "https://kubernetes.io/docs/concepts/services-networking/service/", vid: "https://www.youtube.com/watch?v=t_8N9vK08sE", sb: "https://labs.play-with-k8s.com/", cmd: "kubectl expose deployment backend-app --port=6379 --type=ClusterIP" },
            { d: 20, p: "step2", b: "Step 2", t: "Persistent Storage Claim Maps PVC", de: "Expose external disk infrastructures paths records directly into system container runtimes namespaces without risk wiping configurations states data files.", doc: "https://kubernetes.io/docs/concepts/storage/persistent-volumes/", vid: "https://www.youtube.com/watch?v=0kG7Z8M6_tE", sb: "https://labs.play-with-k8s.com/", cmd: "kubectl get storageclass && kubectl get pvc -A" },
            { d: 21, p: "step2", b: "Step 2", t: "CKA: Master etcd Backup Maintenance", de: "Execute system configuration records backups saving operational cluster inventory metadata logs sheets frames safely snapshots records.", doc: "https://kubernetes.io/docs/tasks/administer-cluster/configure-upgrade-etcd/", vid: "https://www.youtube.com/watch?v=qM-nE6w2_2U", sb: "https://killercoda.com/playgrounds", cmd: "echo 'etcdctl snapshot save state_backup.db --endpoints=127.0.0.1:2379'" },
            { d: 22, p: "step2", b: "Step 2", t: "CKA: Node Tolerations, Taints, and Affinities", de: "Govern specialized workload scheduling routes using key parameters constraints preventing pod deployment placement cross overlaps layouts.", doc: "https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/", vid: "https://www.youtube.com/watch?v=v09v_RkZmqI", sb: "https://killercoda.com/playgrounds", cmd: "kubectl taint nodes node1 key1=value1:NoSchedule" },
            { d: 23, p: "step2", b: "Step 2", t: "CKA: Pod Firewall Security NetworkPolicies", de: "Isolate network connection lanes separating discrete micro-services zones layers using label based traffic blocking rules manifests.", doc: "https://kubernetes.io/docs/concepts/services-networking/network-policies/", vid: "https://www.youtube.com/watch?v=3g_M7Z60iX8", sb: "https://killercoda.com/playgrounds", cmd: "kubectl get netpol --all-namespaces" },
            { d: 24, p: "step2", b: "Step 2", t: "CKA: Live Cluster Diagnosis event Triage Logs", de: "Debug scheduling failures, parse application output streams stdout data records, and locate misconfigured fields parameters properties trees.", doc: "https://kubernetes.io/docs/tasks/debug/", vid: "https://www.youtube.com/watch?v=N_6W_8IeJ58", sb: "https://killercoda.com/playgrounds", cmd: "kubectl describe pods && kubectl logs --tail=20" },
            { d: 25, p: "step2", b: "Step 2", t: "CKA: Administration Simulation Review Mock Exercises", de: "Perform advanced admin operations tasks inside simulated environments environments facing high pressure timeline metrics rules parameters.", doc: "https://kubernetes.io/docs/reference/kubectl/cheatsheet/", vid: "https://www.youtube.com/watch?v=5z_R_XjZ7sc", sb: "https://killercoda.com/playgrounds", cmd: "kubectl config view && kubectl get nodes -o wide" },

            // STEP 3: INFRASTRUCTURE AS CODE (DAYS 26-35)
            { d: 26, p: "step3", b: "Step 3", t: "Terraform Cloud Engine Initializations Actions", de: "Transition cloud footprint creation away from human UI dashboards screens into plain text declarations frameworks structures blocks.", doc: "https://developer.hashicorp.com/terraform/intro", vid: "https://www.youtube.com/watch?v=7xzyuxit49c", sb: "https://developer.hashicorp.com/terraform/tutorials", cmd: "terraform version && terraform init" },
            { d: 27, p: "step3", b: "Step 3", t: "HCL Syntax blocks Resource structures parameters", de: "Define configuration properties instructions parameters matching real server items options configurations within virtual platforms spaces fields.", doc: "https://developer.hashicorp.com/terraform/language", vid: "https://www.youtube.com/watch?v=V9X_p7f6y78", sb: "https://developer.hashicorp.com/terraform/tutorials", cmd: "echo -e 'resource \"local_file\" \"lab\" {\n content=\"IaC\"\n filename=\"dev.txt\"\n}' > main.tf" },
            { d: 28, p: "step3", b: "Step 3", t: "Prospective Modifications Plans Previews", de: "Compute dependency asset graph paths generating execution summary forecasts lists to audit shifts cleanly safely before deployment runs loops.", doc: "https://developer.hashicorp.com/terraform/cli/commands/plan", vid: "https://www.youtube.com/watch?v=V53S_wE-2XU", sb: "https://developer.hashicorp.com/terraform/tutorials", cmd: "terraform plan && terraform apply -auto-approve" },
            { d: 29, p: "step3", b: "Step 3", t: "Remote State Storage Databases Protection Locking", de: "Secure crucial deployment maps history records documents away from local disk breaks using cloud remote buckets repositories holding active data locks mechanisms.", doc: "https://developer.hashicorp.com/terraform/language/state", vid: "https://www.youtube.com/watch?v=H7S86Xw_bC0", sb: "https://developer.hashicorp.com/terraform/tutorials", cmd: "terraform show && terraform state list" },
            { d: 30, p: "step3", b: "Step 3", t: "Parametric Inputs Code variables Abstract Module Packages", de: "Extract fixed values strings away from system blueprints engines files, facilitating code object recycling across environments planes tracks lines.", doc: "https://developer.hashicorp.com/terraform/language/modules", vid: "https://www.youtube.com/watch?v=P_m_LgUHe6Q", sb: "https://developer.hashicorp.com/terraform/tutorials", cmd: "echo 'variable \"region\" { default=\"us-west-2\" }' > variables.tf" },

            { d: 32, p: "step3", b: "Step 3", t: "Ansible Agentless Configuration Topologies Setup", de: "Manage multiple machine configuration modifications states over secure SSH connectivity pathways without client side system application overheads weights.", doc: "https://docs.ansible.com/ansible/latest/index.html", vid: "https://www.youtube.com/watch?v=EcnqJbx7Cqo", sb: "https://killercoda.com/playgrounds", cmd: "ansible --version || echo 'Ready to establish SSH target configuration groups inventory'" },
            { d: 33, p: "step3", b: "Step 3", t: "Declarative Playbooks and Task Lists Orders Sheets", de: "Model application installation setups processes cleanly using readable declarative text configuration sheets structured via standard YAML fields formatting.", doc: "https://docs.ansible.com/ansible/latest/user_guide/playbooks_intro.html", vid: "https://www.youtube.com/watch?v=wg8M2bS_Iug", sb: "https://killercoda.com/playgrounds", cmd: "echo -e '---\n- hosts: localhost\n  tasks:\n    - name: check\n      debug: msg=\"Active\"' > play.yml" },
            { d: 34, p: "step3", b: "Step 3", t: "Jinja2 Dynamic Software Config Rendering files Templates", de: "Intercept software settings configuration templates files, merging generic rows with active variable data maps variables to edit configurations dynamically.", doc: "https://docs.ansible.com/ansible/latest/user_guide/playbooks_templating.html", vid: "https://www.youtube.com/watch?v=b8ZpSInN2G0", sb: "https://killercoda.com/playgrounds", cmd: "ansible-playbook play.yml || echo 'Parse parameters evaluations verification loops models checks fields'" },
            { d: 35, p: "step3", b: "Step 3", t: "Modular Architecture Roles components packaging Models", de: "Refactor multi-line long single script tasks configurations out into tidy portable directory packages separating vars, templates, and actions files models cleanly.", doc: "https://docs.ansible.com/ansible/latest/user_guide/playbooks_reuse_roles.html", vid: "https://www.youtube.com/watch?v=5asvRre_E_s", sb: "https://killercoda.com/playgrounds", cmd: "echo 'Review directory structural trees splitting tasks configurations apart cleanly modularly.'" },

            // STEP 4: CI/CD PIPELINES (DAYS 36-45)
            { d: 36, p: "step4", b: "Step 4", t: "Jenkins Master Automation Server Hosting Operations", de: "Establish continuous build delivery systems overseeing background automated pipelines jobs execution runs branches checking loops tracks layers.", doc: "https://www.jenkins.io/doc/", vid: "https://www.youtube.com/watch?v=FX322kVqk2A", sb: "https://www.jenkins.io/doc/book/installing/docker/", cmd: "docker run -d -p 8080:8080 --name pipeline-orchestrator jenkins/jenkins:lts" },
            { d: 37, p: "step4", b: "Step 4", t: "Pipeline as Code Jenkinsfile Specification Syntax", de: "Draft multi-stage software checking logic sequences directly inside your application source control repositories using custom DSL script streams text files.", doc: "https://www.jenkins.io/doc/book/pipeline/", vid: "https://www.youtube.com/watch?v=7KcS70pKGDw", sb: "https://www.jenkins.io/doc/book/pipeline/jenkinsfile/", cmd: "echo -e 'pipeline {\n  agent any\n  stages {\n    stage(\"Test\") { steps { echo \"Success\" } }\n  }\n}' > Jenkinsfile" },
